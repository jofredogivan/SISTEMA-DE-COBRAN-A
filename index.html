<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE GESTÃO FINANCEIRA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icone.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #151515; --gold: #d4af37; --red: #ff0000; --green: #00ff41; --gray: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #eee; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .container { background-color: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--gray); border-top: 5px solid var(--red); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); text-align: center; font-size: 1.2rem; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid var(--gray); padding-bottom: 10px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gray); color: var(--green); border-radius: 4px; box-sizing: border-box; font-size: 1rem; outline: none; }
        button { width: 100%; padding: 15px; background: linear-gradient(145deg, #cc0000, #880000); border: none; color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .status { margin-top: 20px; padding: 15px; background: #000; border-radius: 4px; border-left: 3px solid var(--gold); display: none; font-size: 0.9rem; }
        #qr-box { margin-top: 20px; background: white; padding: 15px; display: none; justify-content: center; border-radius: 4px; flex-direction: column; align-items: center; }
        .btn-confirm { background: var(--green); color: black; margin-top: 15px; font-size: 0.8rem; padding: 10px; }
        .history { margin-top: 30px; width: 100%; max-width: 400px; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--gray); }
        th { background: #222; color: var(--gold); padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid var(--gray); }
        .val { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestor de Cobrança</h2>
    <div class="field"><label>Chave PIX</label><input type="text" id="chave" placeholder="CPF, E-mail ou Celular"></div>
    <div class="field"><label>Valor da Dívida (R$)</label><input type="number" id="valor" value="3200.00"></div>
    <div class="field"><label>Juros Fixos por Parcela (%)</label><input type="number" id="juros" value="20"></div>
    <div class="field"><label>Parcelamento</label>
        <select id="vezes">
            <option value="1">1x (À vista)</option><option value="2">2x</option><option value="3">3x</option>
            <option value="4">4x</option><option value="5">5x</option><option value="6">6x</option>
            <option value="7">7x</option><option value="8">8x</option><option value="9">9x</option><option value="10">10x</option>
        </select>
    </div>
    <button onclick="gerar()">Gerar Cobranca</button>

    <div id="status" class="status"></div>
    <div id="qr-box">
        <div id="qrcode"></div>
        <button class="btn-confirm" onclick="confirmar()">Confirmar Pagamento</button>
    </div>
</div>

<div class="history">
    <h3 style="color:var(--gold); font-size: 0.9rem;">HISTÓRICO DE RECEBIMENTOS</h3>
    <table>
        <thead><tr><th>Data</th><th>Parcela</th><th>Valor</th></tr></thead>
        <tbody id="log"></tbody>
    </table>
    <button onclick="limpar()" style="background:transparent; color:gray; border:none; font-size:0.6rem; cursor:pointer; margin-top:10px;">Limpar Histórico</button>
</div>

<script>
    let temp = null;
    function gerar() {
        const chave = document.getElementById('chave').value;
        const val = parseFloat(document.getElementById('valor').value);
        const jur = parseFloat(document.getElementById('juros').value) / 100;
        const parc = parseInt(document.getElementById('vezes').value);

        if(!chave || isNaN(val)) return alert("Preencha os campos!");

        const base = val / parc;
        const juroFixo = val * jur;
        const final = base + juroFixo;

        temp = { valor: final.toFixed(2), info: parc + "x" };

        const st = document.getElementById('status');
        st.style.display = 'block';
        st.innerHTML = `Base: R$ ${base.toFixed(2)} + Juros: R$ ${juroFixo.toFixed(2)}<br><b>TOTAL PARCELA: <span style="color:red">R$ ${final.toFixed(2)}</span></b>`;

        const payload = `00020101021226580014br.gov.bcb.pix01${chave.length.toString().padStart(2, '0')}${chave}520400005303986540${temp.valor.length.toString().padStart(2, '0')}${temp.valor}5802BR5918COBRANCA SERVICO6008BRASILIA62070503***6304`;

        document.getElementById('qrcode').innerHTML = "";
        document.getElementById('qr-box').style.display = 'flex';
        new QRCode(document.getElementById('qrcode'), { text: payload, width: 180, height: 180 });
    }

    function confirmar() {
        if(!temp) return;
        const h = JSON.parse(localStorage.getItem('h_cob')) || [];
        const d = new Date();
        h.unshift({ d: d.toLocaleDateString() + " " + d.getHours() + ":" + d.getMinutes(), p: temp.info, v: temp.valor });
        localStorage.setItem('h_cob', JSON.stringify(h));
        desenhar();
        alert("Salvo no histórico!");
    }

    function desenhar() {
        const h = JSON.parse(localStorage.getItem('h_cob')) || [];
        document.getElementById('log').innerHTML = h.map(i => `<tr><td>${i.d}</td><td>${i.p}</td><td class="val">R$ ${i.v}</td></tr>`).join('') || "<tr><td colspan='3' style='text-align:center'>Vazio</td></tr>";
    }

    function limpar() { if(confirm("Limpar log?")) { localStorage.removeItem('h_cob'); desenhar(); } }
    desenhar();
</script>
</body>
</html>
